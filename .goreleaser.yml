# Goreleaser configuration for cross-platform builds
version: 2

builds:
  - main: ./cmd/dops
    binary: dops
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/sanjaysundarmurthy/devops-cli/internal/cli.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "dops_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
